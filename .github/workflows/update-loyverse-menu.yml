name: Update Loyverse Menu

on:
  workflow_dispatch:

jobs:
  update-loyverse:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate secret
        run: |
          if [ -z "${{ secrets.LOYVERSE_TOKEN }}" ]; then
            echo "Missing repository secret LOYVERSE_TOKEN"
            exit 1
          fi

      - name: Create or update Loyverse menu
        env:
          LOYVERSE_TOKEN: ${{ secrets.LOYVERSE_TOKEN }}
        run: node scripts/update-loyverse-menu.mjs

      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loyverse-update-results
          path: artifacts/
