name: Remove Burger Variants

on:
  workflow_dispatch:

jobs:
  remove-burger-variants:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate secret
        run: |
          if [ -z "${{ secrets.LOYVERSE_TOKEN }}" ]; then
            echo "Missing repository secret LOYVERSE_TOKEN"
            exit 1
          fi

      - name: Remove burger variants
        env:
          LOYVERSE_TOKEN: ${{ secrets.LOYVERSE_TOKEN }}
        run: node scripts/remove-burger-variants.mjs

      - name: Upload cleanup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: burger-variant-cleanup-results
          path: artifacts/
